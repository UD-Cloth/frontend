<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="theme-color" content="#23272F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/png" href="/UD.png" />
  <title>URBAN DRAPE - Premium Men's Fashion</title>
  <meta name="description"
    content="Shop premium men's fashion - T-shirts, shirts, hoodies, jackets, jeans and accessories." />
  <meta name="author" content="URBAN DRAPE" />
  <link rel="canonical" href="https://www.urbandrape.in/" />

  <meta property="og:title" content="URBAN DRAPE - Premium Men's Fashion" />
  <meta property="og:description"
    content="Shop premium men's fashion - T-shirts, shirts, hoodies, jackets, jeans and accessories." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.urbandrape.in" />
  <meta property="og:image" content="/UD.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@UrbanDrape" />
  <meta name="twitter:image" content="/UD.png" />

  <style>
    /* Full screen loader */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
    }

    .logo {
      width: 140px;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Skip to main content link for keyboard accessibility -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-white focus:text-black focus:font-medium focus:rounded focus:shadow-lg">Skip to main content</a>

  <!-- Preloader -->
  <div class="preloader">
    <img src="/UD.png" alt="Brand Logo" class="logo">
  </div>
  <script>
    // Erase preloader synchronously on admin routes (before React initializes)
    if (window.location.pathname.startsWith('/admin')) {
      const p = document.querySelector('.preloader');
      if (p) p.remove();
    }
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Robust vanilla preloader removal, decoupled from React
    const removePreloader = () => {
      const preloader = document.querySelector('.preloader');
      if (preloader && preloader.parentNode) {
        preloader.parentNode.removeChild(preloader);
      }
    };

    window.addEventListener('load', () => {
      setTimeout(removePreloader, 750);
    });

    setTimeout(removePreloader, 3000);
  </script>
</body>

</html>
